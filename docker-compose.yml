version: '3.9'

services:
  postgres:
    # pgvector/pgvector ships postgres with the vector extension pre-installed.
    # Using pg16 to match what Supabase runs in production.
    image: pgvector/pgvector:pg16
    container_name: auction_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: auction_user
      POSTGRES_PASSWORD: auction_pass
      POSTGRES_DB: auction_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql runs once on first container start — enables extensions
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auction_user -d auction_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: auction_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    # requirepass enforces auth even locally — mirrors production setup
    command: redis-server --requirepass redis_pass --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_pass', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
